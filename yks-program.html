<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YKS 87 Günlük Program</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --orange: #ff6b2b;
    --orange-dim: rgba(255,107,43,0.15);
    --orange-glow: rgba(255,107,43,0.08);
    --white: #f0f0f5;
    --muted: #666677;
    --border: rgba(255,255,255,0.06);
    --tyt: #4fc3f7;
    --aytmat: #ff6b2b;
    --aytfen: #a78bfa;
    --deneme: #34d399;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(255,107,43,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

  header { text-align: center; padding: 32px 0 40px; }
  header h1 {
    font-size: clamp(28px, 6vw, 52px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1;
  }
  header h1 span { color: var(--orange); }
  header p { color: var(--muted); margin-top: 10px; font-size: 14px; font-family: 'Space Mono', monospace; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .stat-card .num {
    font-size: 28px;
    font-weight: 800;
    font-family: 'Space Mono', monospace;
    color: var(--orange);
  }
  .stat-card .lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 28px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 18px;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: 'Space Mono', monospace; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .filters {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .filter-btn {
    padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-family: 'Space Mono', monospace; font-size: 11px;
    cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--orange); color: var(--orange); background: var(--orange-dim);
  }

  .week-block { margin-bottom: 28px; }
  .week-header {
    font-size: 11px; font-family: 'Space Mono', monospace;
    color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 10px; padding-left: 4px;
  }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 8px;
  }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    transition: border-color 0.15s, transform 0.1s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .day-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-1px); }
  .day-card.done { border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.04); }
  .day-card.done::after {
    content: '✓';
    position: absolute; top: 12px; right: 12px;
    color: var(--deneme); font-size: 14px;
  }
  .day-card.today { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange-dim), 0 0 20px var(--orange-glow); }

  .day-num {
    font-size: 11px; font-family: 'Space Mono', monospace;
    color: var(--muted); margin-bottom: 8px;
  }
  .day-num .day-of-week { color: var(--orange); margin-left: 6px; }

  .day-tasks { display: flex; flex-direction: column; gap: 5px; }
  .task-tag {
    display: flex; align-items: flex-start; gap: 7px;
    font-size: 12px; line-height: 1.4;
  }
  .task-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
  .task-dot.tyt { background: var(--tyt); }
  .task-dot.aytmat { background: var(--aytmat); }
  .task-dot.aytfen { background: var(--aytfen); }
  .task-dot.deneme { background: var(--deneme); }

  .task-text { color: var(--white); font-size: 12px; }
  .task-sub { color: var(--muted); font-size: 11px; font-family: 'Space Mono', monospace; }

  .progress-bar-wrap { 
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 20px; margin-bottom: 28px;
  }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--orange), #ff9a5c); border-radius: 99px; transition: width 0.4s; }

  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .days-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>YKS <span>87 GÜN</span></h1>
  <p>AYT Mat · AYT Fen · TYT — Günlük Program</p>
</header>

<div class="stats-bar">
  <div class="stat-card"><div class="num" id="stat-total">87</div><div class="lbl">Gün Kaldı</div></div>
  <div class="stat-card"><div class="num" id="stat-done">0</div><div class="lbl">Tamamlandı</div></div>
  <div class="stat-card"><div class="num" id="stat-deneme">0</div><div class="lbl">Deneme</div></div>
  <div class="stat-card"><div class="num" id="stat-pct">0%</div><div class="lbl">İlerleme</div></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-label"><span>Genel İlerleme</span><span id="prog-text">0 / 87</span></div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--tyt)"></div> TYT</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--aytmat)"></div> AYT Mat</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--aytfen)"></div> AYT Fen</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--deneme)"></div> Deneme</div>
</div>

<div class="filters">
  <button class="filter-btn active" onclick="filterWeek(0)">Tümü</button>
  <button class="filter-btn" onclick="filterWeek(1)">Hafta 1</button>
  <button class="filter-btn" onclick="filterWeek(2)">Hafta 2</button>
  <button class="filter-btn" onclick="filterWeek(3)">Hafta 3</button>
  <button class="filter-btn" onclick="filterWeek(4)">Hafta 4</button>
  <button class="filter-btn" onclick="filterWeek(5)">Hafta 5</button>
  <button class="filter-btn" onclick="filterWeek(6)">Hafta 6</button>
  <button class="filter-btn" onclick="filterWeek(7)">Hafta 7</button>
  <button class="filter-btn" onclick="filterWeek(8)">Hafta 8+</button>
</div>

<div id="calendar"></div>

</div>

<script>
const DAYS_OF_WEEK = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
const START_DATE = new Date('2026-03-24');

// AYT MAT KONULARI - 87 güne dağıtılacak
const aytMatTopics = [
  // Analitik Geometri
  'Analitik Geo: Nokta & Doğru',
  'Analitik Geo: Doğru Denklemleri',
  'Analitik Geo: Çember',
  'Analitik Geo: Elips',
  'Analitik Geo: Hiperbol & Parabol',
  // Türev
  'Türev: Temel Kavramlar',
  'Türev: Türev Alma Kuralları',
  'Türev: Bileşik & Ters Fonk.',
  'Türev: Monotonluk & Ekstremum',
  'Türev: Eğim & Teğet',
  'Türev: Uygulamalar',
  // İntegral
  'İntegral: Belirsiz İntegral',
  'İntegral: Belirli İntegral',
  'İntegral: Alan Hesabı',
  'İntegral: Uygulamalar',
  // Trigonometri
  'Trigonometri: Temel Kavramlar',
  'Trigonometri: Birim Çember',
  'Trigonometri: Trigonometrik Denklemler',
  'Trigonometri: Toplam-Fark Formülleri',
  // Logaritma & Üstel
  'Logaritma: Temel Kurallar',
  'Logaritma: Denklemler & Eşitsizlikler',
  'Üstel Fonksiyonlar',
  // Limit & Süreklilik
  'Limit: Temel Kavramlar',
  'Limit: Özel Limitler',
  'Süreklilik',
  // Diziler
  'Diziler: Aritmetik Dizi',
  'Diziler: Geometrik Dizi',
  'Diziler: Özel Diziler',
  // Karmaşık Sayılar
  'Karmaşık Sayılar',
  // Polinomlar
  'Polinomlar: Temel İşlemler',
  'Polinomlar: Çarpanlara Ayırma',
  'Polinomlar: Kökler',
  // 2. Derece Denklemler
  '2. Derece Denklem & Eşitsizlik',
  // Fonksiyonlar
  'Fonksiyonlar: Türler & Özellikler',
  'Fonksiyonlar: Bileşke & Ters',
  // Kombinatorik & Olasılık (tekrar)
  'Permütasyon & Kombinasyon',
  'Binom & Olasılık',
  // İspat & Mantık
  'Mantık & İspat',
  // Sayılar
  'Sayılar Teorisi Uygulamaları',
  // Tekrar & Mix
  'AYT Mat: Karma Soru Çözümü',
  'AYT Mat: Karma Soru Çözümü',
  'AYT Mat: Karma Soru Çözümü',
];

// AYT FEN KONULARI
const aytFenTopics = [
  // FİZİK
  'Fizik: Vektörler & Kuvvet',
  'Fizik: Hareket (Kinematik)',
  'Fizik: Newton Kanunları',
  'Fizik: İş, Güç, Enerji',
  'Fizik: İtme & Momentum',
  'Fizik: Tork & Denge',
  'Fizik: Basit Harmonik Hareket',
  'Fizik: Dalgalar',
  'Fizik: Elektrik Alan & Potansiyel',
  'Fizik: Kondansatör',
  'Fizik: Akım & Devreler',
  'Fizik: Manyetik Alan',
  'Fizik: Elektromanyetik İndüksiyon',
  'Fizik: Optik',
  'Fizik: Özel Görelilik Giriş',
  'Fizik: Modern Fizik',
  // KİMYA
  'Kimya: Mol & Stokiyometri',
  'Kimya: Gazlar',
  'Kimya: Çözeltiler',
  'Kimya: Kimyasal Denge',
  'Kimya: Asit-Baz',
  'Kimya: Çözünürlük Dengesi',
  'Kimya: Elektrokimya',
  'Kimya: Organik: Hidrokarbonlar',
  'Kimya: Organik: Fonksiyonlu Bileşikler',
  'Kimya: Organik: Reaksiyonlar',
  'Kimya: Termal & Kinetik',
  // BİYOLOJİ
  'Biyoloji: Hücre Yapısı & Organeller',
  'Biyoloji: Hücre Bölünmesi',
  'Biyoloji: Fotosentez & Solunum',
  'Biyoloji: DNA, RNA & Protein Sentezi',
  'Biyoloji: Genetik & Kalıtım',
  'Biyoloji: Ekosistem & Biyoçeşitlilik',
  'Biyoloji: İnsan Fizyolojisi 1',
  'Biyoloji: İnsan Fizyolojisi 2',
  'Biyoloji: Evrim',
];

// AYT FEN döngüsel: Fizik → Kimya → Biyoloji → Fizik → ...
const aytFizikTopics = [
  'Fizik: Vektörler & Kuvvet',
  'Fizik: Hareket (Kinematik)',
  'Fizik: Newton Kanunları',
  'Fizik: İş, Güç, Enerji',
  'Fizik: İtme & Momentum',
  'Fizik: Tork & Denge',
  'Fizik: Basit Harmonik Hareket',
  'Fizik: Dalgalar',
  'Fizik: Elektrik Alan & Potansiyel',
  'Fizik: Kondansatör',
  'Fizik: Akım & Devreler',
  'Fizik: Manyetik Alan',
  'Fizik: Elektromanyetik İndüksiyon',
  'Fizik: Optik',
  'Fizik: Modern Fizik',
];
const aytKimyaTopics = [
  'Kimya: Mol & Stokiyometri',
  'Kimya: Gazlar',
  'Kimya: Çözeltiler',
  'Kimya: Kimyasal Denge',
  'Kimya: Asit-Baz',
  'Kimya: Çözünürlük Dengesi',
  'Kimya: Elektrokimya',
  'Kimya: Organik: Hidrokarbonlar',
  'Kimya: Organik: Fonksiyonlu Bileşikler',
  'Kimya: Organik: Reaksiyonlar',
  'Kimya: Termal & Kinetik',
];
const aytBiyoTopics = [
  'Biyoloji: Hücre Yapısı & Organeller',
  'Biyoloji: Hücre Bölünmesi',
  'Biyoloji: Fotosentez & Solunum',
  'Biyoloji: DNA, RNA & Protein Sentezi',
  'Biyoloji: Genetik & Kalıtım',
  'Biyoloji: Ekosistem & Biyoçeşitlilik',
  'Biyoloji: İnsan Fizyolojisi 1',
  'Biyoloji: İnsan Fizyolojisi 2',
  'Biyoloji: Evrim',
];

// Döngüsel fen: Gün 1→Fizik, Gün 2→Kimya, Gün 3→Biyoloji, Gün 4→Fizik...
const fenCounters = [0, 0, 0];
function getFenTopic(fenDayIdx) {
  const slot = fenDayIdx % 3;
  if (slot === 0) {
    const label = aytFizikTopics[fenCounters[0] % aytFizikTopics.length];
    fenCounters[0]++;
    return { type: 'aytfen', label };
  } else if (slot === 1) {
    const label = aytKimyaTopics[fenCounters[1] % aytKimyaTopics.length];
    fenCounters[1]++;
    return { type: 'aytfen', label };
  } else {
    const label = aytBiyoTopics[fenCounters[2] % aytBiyoTopics.length];
    fenCounters[2]++;
    return { type: 'aytfen', label };
  }
}

function buildProgram() {
  const days = [];
  let aytMatIdx = 0;
  let fenDayIdx = 0;

  for (let d = 0; d < 87; d++) {
    const date = new Date(START_DATE);
    date.setDate(date.getDate() + d);
    const tasks = [];

    const isAYTDay = d % 2 === 1;

    if (!isAYTDay) {
      // TYT günü: sadece denemeler
      tasks.push({ type: 'deneme', label: 'TYT Mat Deneme', sub: 'Deneme' });
      tasks.push({ type: 'deneme', label: 'TYT Türkçe Deneme', sub: 'Deneme' });
    } else {
      // AYT Mat günü: konu + denemeler
      if (aytMatIdx < aytMatTopics.length) {
        tasks.push({ type: 'aytmat', label: aytMatTopics[aytMatIdx], sub: 'Konu' });
        aytMatIdx++;
      } else {
        tasks.push({ type: 'aytmat', label: 'AYT Mat: Karma Tekrar', sub: 'Konu' });
      }
      tasks.push({ type: 'deneme', label: 'AYT Mat Deneme', sub: 'Deneme' });
      tasks.push({ type: 'deneme', label: 'TYT Türkçe Deneme', sub: 'Deneme' });
    }

    // Her gün AYT Fen: döngüsel Fizik → Kimya → Biyoloji
    const fenTask = getFenTopic(fenDayIdx);
    tasks.push(fenTask);
    fenDayIdx++;

    days.push({ day: d + 1, date, tasks });
  }
  return days;
}

const PROGRAM = buildProgram();

// LocalStorage ile tamamlandı takibi
function getDone() {
  try { return JSON.parse(localStorage.getItem('yks_done') || '[]'); } catch { return []; }
}
function setDone(arr) {
  try { localStorage.setItem('yks_done', JSON.stringify(arr)); } catch {}
}

function toggleDay(dayNum) {
  let done = getDone();
  if (done.includes(dayNum)) done = done.filter(d => d !== dayNum);
  else done.push(dayNum);
  setDone(done);
  render();
}

let currentFilter = 0;

function filterWeek(w) {
  currentFilter = w;
  document.querySelectorAll('.filter-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === w);
  });
  render();
}

function render() {
  const done = getDone();
  const today = new Date();
  today.setHours(0,0,0,0);

  // Stats
  document.getElementById('stat-done').textContent = done.length;
  document.getElementById('stat-deneme').textContent = PROGRAM.reduce((s, d) => s + d.tasks.filter(t => t.type === 'deneme').length, 0);
  const pct = Math.round((done.length / 87) * 100);
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('prog-text').textContent = done.length + ' / 87';
  document.getElementById('prog-fill').style.width = pct + '%';

  // Remaining days
  const startD = new Date(START_DATE);
  startD.setHours(0,0,0,0);
  const diffMs = today - startD;
  const daysPassed = Math.max(0, Math.floor(diffMs / 86400000));
  const remaining = Math.max(0, 87 - daysPassed);
  document.getElementById('stat-total').textContent = remaining;

  // Build filtered data
  let filtered = PROGRAM;
  if (currentFilter > 0) {
    const start = (currentFilter - 1) * 7;
    const end = Math.min(start + 7, 87);
    filtered = PROGRAM.slice(start, end);
  }
  if (currentFilter === 8) {
    filtered = PROGRAM.slice(49);
  }

  // Group by weeks
  const calDiv = document.getElementById('calendar');
  calDiv.innerHTML = '';

  // Show in chunks of 7
  let html = '';
  const chunkSize = currentFilter === 0 ? 7 : filtered.length;
  for (let i = 0; i < filtered.length; i += chunkSize) {
    const chunk = filtered.slice(i, Math.min(i + chunkSize, filtered.length));
    const weekNum = Math.floor((chunk[0].day - 1) / 7) + 1;
    html += `<div class="week-block"><div class="week-header">Hafta ${weekNum} — Gün ${chunk[0].day}–${chunk[chunk.length-1].day}</div><div class="days-grid">`;
    
    for (const d of chunk) {
      const dateD = new Date(d.date);
      dateD.setHours(0,0,0,0);
      const isDone = done.includes(d.day);
      const isToday = dateD.getTime() === today.getTime();
      const dayOfWeek = DAYS_OF_WEEK[d.date.getDay()];
      const dateStr = d.date.getDate() + '.' + String(d.date.getMonth()+1).padStart(2,'0');

      html += `<div class="day-card${isDone ? ' done' : ''}${isToday ? ' today' : ''}" onclick="toggleDay(${d.day})">`;
      html += `<div class="day-num">GÜN ${d.day} · ${dateStr}<span class="day-of-week">${dayOfWeek}</span>${isToday ? ' ← Bugün' : ''}</div>`;
      html += `<div class="day-tasks">`;
      for (const t of d.tasks) {
        html += `<div class="task-tag"><div class="task-dot ${t.type}"></div><div><div class="task-text">${t.label}</div></div></div>`;
      }
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }

  calDiv.innerHTML = html;
}

render();
</script>
</body>
</html>
